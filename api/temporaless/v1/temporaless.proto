// Temporaless v1 protobuf contract.
//
// Temporaless is a storage-first, serverless workflow framework. Workflow runs,
// activity invocations, durable timers, signals (events), and coordination
// claims are all serialized as protobuf records at deterministic paths under
// `temporaless/v1/namespace={namespace}/workflow_id={workflow_id}/run_id={run_id}/kind={kind}/...`
// (strict Hive partitioning — every directory level is `key=value`, so Spark /
// Trino / DuckDB / Athena auto-discover the partition columns).
//
// `RecordStoreService` is the cross-language storage contract. Any backend
// (OpenDAL filesystem, S3, GCS, SQL, ...) implements the same RPC surface, so
// generated CLI / gRPC / HTTP / MCP wrappers all see the same operations.
syntax = "proto3";

package temporaless.v1;

import "buf/validate/validate.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/jim-technologies/temporaless/core/go/gen/temporaless/v1;temporalessv1";

// WorkflowOptions identifies a single workflow run plus its replay context.
//
// IDs are caller-provided. The framework validates path-safe ASCII but never
// generates them — the application owns the ID scheme (e.g. `prices:aapl`,
// `tweet:12345`, `llm:answer`).
message WorkflowOptions {
  // Stable identifier for the workflow definition. Reused across runs.
  string workflow_id = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.workflow_id.not_dot_path"
      message: "workflow_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  // Identifier for this particular run of the workflow. By convention,
  // schedule-driven workflows embed the fire time (e.g. `2026-05-04T09:30:00Z`)
  // so reruns and backfills are explicit.
  string run_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.run_id.not_dot_path"
      message: "run_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  // Application-supplied build identity (git SHA, release tag, immutable build
  // ID). Bumping it invalidates stored results because the digest changes.
  // Defaults to the `TEMPORALESS_CODE_VERSION` env var, or `dev` when unset.
  string code_version = 3;
  // Owner identity for activity claims. Required when a claim store is
  // configured; otherwise should be empty. Reusing the same owner across
  // invocations is what allows resume of a stuck claim by the same logical
  // worker.
  string claim_owner_id = 4 [
    (buf.validate.field).string = {pattern: "^$|^[A-Za-z0-9._:-]+$"},
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.claim_owner_id.not_dot_path"
      message: "claim_owner_id must not be . or .."
      expression: "this == '' || (this != '.' && this != '..')"
    }
  ];
}

// ActivityOptions controls how a single activity executes within a workflow.
message ActivityOptions {
  // Stable identifier for the activity within its workflow run. Authoring
  // responsibility: must be deterministic across replays of the same logical
  // step (e.g. `fetch:aapl`, `normalize:tweet`, `llm:complete`). Reusing the
  // same activity_id with different input is treated as a workflow bug.
  string activity_id = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.id.activity_id.not_dot_path"
      message: "activity_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  // Optional retry policy. When unset, the activity runs at most once.
  RetryPolicy retry_policy = 2;
}

// RetryPolicy controls in-process retry behavior for a single activity.
//
// Failures matched by `non_retryable_error_codes` short-circuit the loop and
// surface immediately. Between attempts, the runtime persists an
// `ActivityRecord` with status `ACTIVITY_STATUS_RETRYING` so a process death
// during the backoff sleep doesn't lose the attempt history.
message RetryPolicy {
  // Wait before the second attempt. Required when `maximum_attempts > 1`.
  google.protobuf.Duration initial_interval = 1;
  // Multiplier applied to the previous interval to compute the next. Zero is
  // treated as 1.0 (linear, no growth). Typical value: 2.0.
  double backoff_coefficient = 2;
  // Cap on backoff growth. Zero means uncapped.
  google.protobuf.Duration maximum_interval = 3;
  // Total attempts including the initial one. Must be > 0 when a policy is
  // set; an unset policy implies a single attempt.
  uint32 maximum_attempts = 4;
  // Activity error codes (carried via `ActivityFailure.code`) that should
  // skip remaining retries and surface the failure immediately.
  repeated string non_retryable_error_codes = 5;
  // When the next backoff interval is at least this long, persist the retry
  // as a durable timer instead of sleeping in-process. The activity record is
  // written as `ACTIVITY_STATUS_RETRYING` with `next_attempt_at` set, a paired
  // `TIMER_KIND_ACTIVITY_RETRY` timer is scheduled at the same instant, and
  // the runtime returns the typed pending error so the workflow stays
  // IN_PROGRESS. The bundled timer scanner re-invokes the workflow after
  // `fire_at` and the retry loop resumes from the next attempt.
  //
  // Zero (the default) keeps the legacy in-process behavior: every retry
  // sleeps inside the activity. Set this to ~30s for LLM workflows whose
  // rate-limit windows often exceed a serverless function's max duration.
  google.protobuf.Duration durable_backoff_threshold = 6;
}

// ActivityStatus tracks an activity's lifecycle in storage.
enum ActivityStatus {
  ACTIVITY_STATUS_UNSPECIFIED = 0;
  // Activity returned a result. The `result` field carries the response.
  ACTIVITY_STATUS_COMPLETED = 1;
  // Activity exhausted retries. The `failure` field carries the terminal
  // error; `attempts` carries the full per-attempt history. Replay surfaces
  // this failure to the workflow.
  ACTIVITY_STATUS_FAILED = 2;
  // Intermediate state between attempts: persisted after a failed attempt
  // that still has retries remaining, so a re-invocation can resume from
  // `len(attempts) + 1` instead of restarting from attempt 1.
  ACTIVITY_STATUS_RETRYING = 3;
}

// WorkflowStatus tracks a workflow run's lifecycle in storage.
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  // Workflow returned a result.
  WORKFLOW_STATUS_COMPLETED = 1;
  // Workflow body returned a non-pending error. Replay surfaces the failure.
  WORKFLOW_STATUS_FAILED = 2;
  // Workflow body started but did not return a terminal result — typically
  // because it returned a typed pending error (timer, claim busy, event
  // pending). The next invocation re-executes the body.
  WORKFLOW_STATUS_IN_PROGRESS = 3;
}

// TimerStatus tracks the lifecycle of a durable sleep timer.
enum TimerStatus {
  TIMER_STATUS_UNSPECIFIED = 0;
  // Timer is waiting for `fire_at`. The workflow returned `ErrTimerPending`
  // and should be re-invoked after `fire_at`.
  TIMER_STATUS_SCHEDULED = 1;
  // Timer's `fire_at` has passed and a workflow re-invocation has consumed it.
  TIMER_STATUS_FIRED = 2;
  // Timer was canceled before firing. Replay treats this as a conflict.
  TIMER_STATUS_CANCELED = 3;
}

// TimerKind discriminates timer record uses.
enum TimerKind {
  TIMER_KIND_UNSPECIFIED = 0;
  // Plain durable sleep written by `workflow.Sleep`.
  TIMER_KIND_SLEEP = 1;
  // Paired with a RETRYING ActivityRecord: the runtime persisted a long retry
  // backoff as a durable timer instead of sleeping in-process. When the timer
  // is due, the workflow re-invokes and the activity's retry loop resumes
  // from the next attempt. Timer ID convention is `activity-retry:{activity_id}`;
  // the `activity-retry:` prefix is reserved by the runtime and rejected
  // from user-supplied timer IDs in `workflow.Sleep`.
  TIMER_KIND_ACTIVITY_RETRY = 2;
}

// RecordSchemaVersion identifies the record family. Each protobuf record sets
// this to allow forward-compatible decoding.
enum RecordSchemaVersion {
  RECORD_SCHEMA_VERSION_UNSPECIFIED = 0;
  RECORD_SCHEMA_VERSION_ACTIVITY = 1;
  RECORD_SCHEMA_VERSION_WORKFLOW = 2;
  RECORD_SCHEMA_VERSION_TIMER = 3;
  RECORD_SCHEMA_VERSION_CLAIM = 4;
  RECORD_SCHEMA_VERSION_EVENT = 5;
}

// ClaimResourceType identifies what kind of work a claim coordinates.
enum ClaimResourceType {
  CLAIM_RESOURCE_TYPE_UNSPECIFIED = 0;
  CLAIM_RESOURCE_TYPE_WORKFLOW = 1;
  CLAIM_RESOURCE_TYPE_ACTIVITY = 2;
  CLAIM_RESOURCE_TYPE_TIMER = 3;
}

// ClaimCapability declares what the configured claim store can do. Adapters
// must report this honestly via `GetStoreCapabilities`.
enum ClaimCapability {
  CLAIM_CAPABILITY_UNSPECIFIED = 0;
  // No claim coordination. Activities run with at-least-once semantics; side
  // effects must be idempotent.
  CLAIM_CAPABILITY_NO_CLAIMS = 1;
  // Storage supports atomic create-if-absent. Claims prevent concurrent
  // execution within a run, but cannot safely take over stale claims.
  CLAIM_CAPABILITY_CREATE_ONLY_CLAIMS = 2;
  // Storage supports compare-and-swap (e.g. via S3 If-None-Match or GCS
  // generation). Claims can be refreshed and stale ones can be taken over.
  CLAIM_CAPABILITY_CAS_CLAIMS = 3;
}

// WorkflowKey addresses a single workflow run.
message WorkflowKey {
  string namespace = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.namespace.not_dot_path"
      message: "namespace must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  string workflow_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.workflow_id.not_dot_path"
      message: "workflow_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  string run_id = 3 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.run_id.not_dot_path"
      message: "run_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
}

