// ActivityFailure is the typed error surface that retry policies match on.
message ActivityFailure {
  // Stable identifier the user supplies (e.g. `rate_limited`, `invalid_argument`,
  // `upstream_5xx`). Empty when the error did not carry a typed code.
  string code = 1;
  // Human-readable description of the failure.
  string message = 2;
  // Minimum wait the activity body recommends before the next attempt — derived
  // from a vendor signal such as the HTTP `Retry-After` header, a Slack
  // `Retry-After` field, or an OpenAI `x-ratelimit-reset` header. The retry
  // planner uses `max(computed_interval, retry_after)` to compute the next
  // backoff so vendor pacing wins over the configured exponential schedule.
  //
  // When combined with `RetryPolicy.durable_backoff_threshold`, a vendor 429
  // with `Retry-After: 600` produces a durable timer with `fire_at = now + 10min`
  // even if the configured initial_interval is much shorter — exactly the
  // pattern LLM and stocks-vendor workflows need.
  //
  // Unset (zero) means "no vendor signal; use the computed interval as-is".
  google.protobuf.Duration retry_after = 3;
}

// ActivityAttempt is one invocation of the activity body within a retry loop.
message ActivityAttempt {
  // 1-indexed attempt counter.
  uint32 attempt = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp completed_at = 3;
  // Set when the attempt failed; absent when the attempt succeeded.
  ActivityFailure failure = 4;
}

// ActivityRecord captures everything the runtime needs to replay or resume an
// activity. Stored at `activity/{activity_id}.binpb` under the workflow run.
message ActivityRecord {
  // Field 5 was input_digest (SHA-256 fingerprint). Removed in v0.4: user-
  // supplied IDs are the contract; replay reuses by id, not by input bytes.
  reserved 5;

  RecordSchemaVersion schema_version = 1;
  ActivityKey key = 2;
  // Derived from the request and response message types. Useful for analytics;
  // checked against the stored value on replay so a code change that swaps
  // input/output types fails loudly rather than returning a stale result.
  string activity_type = 3;
  // Caller-supplied build identity. Replay compares stored vs current and
  // rejects mismatch so a bumped code_version triggers re-execution (with
  // a fresh activity_id or run_id) rather than silently replaying stale data.
  string code_version = 4;
  google.protobuf.Any input = 6;
  ActivityStatus status = 7;
  // Set when status is COMPLETED.
  google.protobuf.Any result = 8;
  // Set when status is FAILED.
  ActivityFailure failure = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp completed_at = 11;
  // Per-attempt history. Always carries every attempt the runtime has run so
  // far, including the one that produced the current `status`.
  repeated ActivityAttempt attempts = 12;
  // Application-supplied structured metadata (model, tokens, vendor, etc.)
  // attached via `workflow.Annotate` from inside the activity body.
  map<string, string> annotations = 13;
  // Wall-clock instant at which the runtime should resume a durable retry.
  // Only set when status is `ACTIVITY_STATUS_RETRYING` and the policy's
  // `durable_backoff_threshold` was met — the runtime paired this record
  // with a `TIMER_KIND_ACTIVITY_RETRY` timer. When unset on a RETRYING record,
  // the retry was in-process (legacy / threshold = 0) and replay resumes
  // immediately if a backing scanner re-invokes the workflow.
  google.protobuf.Timestamp next_attempt_at = 14;
  // Normalized effective retry policy used to create this record. Absent
  // means single-attempt execution. RETRYING replay requires this policy to
  // match the caller's current policy so a deploy cannot silently change the
  // remaining attempt count or backoff schedule under the same code_version.
  // Terminal records remain authoritative and retain the policy for audit.
  RetryPolicy retry_policy = 15;
  // Caller-supplied ID of the durable retry timer paired with this activity.
  // Empty when durable retry is disabled. RETRYING replay verifies it against
  // ActivityOptions.retry_timer_id; terminal records retain it for cleanup
  // and audit even if no wait crossed the durable threshold.
  string retry_timer_id = 16;
}

// WorkflowRecord captures workflow lifecycle state. Stored at `workflow.binpb`
// under the workflow run.
message WorkflowRecord {
  // Field 5 was input_digest (SHA-256 fingerprint). Removed in v0.4: user-
  // supplied IDs are the contract; replay reuses by id, not by input bytes.
  reserved 5;

  RecordSchemaVersion schema_version = 1;
  WorkflowKey key = 2;
  string workflow_type = 3;
  string code_version = 4;
  google.protobuf.Any input = 6;
  WorkflowStatus status = 7;
  // Set when status is COMPLETED.
  google.protobuf.Any result = 8;
  // Set when status is FAILED.
  ActivityFailure failure = 9;
  google.protobuf.Timestamp created_at = 10;
  // Set when the workflow has reached a terminal status (COMPLETED or FAILED).
  google.protobuf.Timestamp completed_at = 11;
  // Annotations attached via `workflow.Annotate` from within the workflow body
  // (between activity calls). Activity-scope annotations live on the
  // ActivityRecord instead.
  map<string, string> annotations = 12;
  // Caller-supplied logical ordering time copied from WorkflowOptions. Stores
  // use it for latest-run pointer ordering; when absent they use lifecycle
  // record_time. This value is immutable for a workflow run.
  google.protobuf.Timestamp run_order_time = 13;
}

// TimerRecord backs `workflow.Sleep`. Stored at `timer/{timer_id}.binpb`.
message TimerRecord {
  // Field 5 was input_digest (SHA-256 fingerprint). Removed in v0.4: user-
  // supplied IDs are the contract; replay reuses by id, not by input bytes.
  reserved 5;

  RecordSchemaVersion schema_version = 1;
  TimerKey key = 2;
  TimerKind timer_kind = 3;
  string code_version = 4;
  // Original duration the workflow body asked to sleep for.
  google.protobuf.Duration duration = 6;
  TimerStatus status = 7;
  // Wall-clock instant at which the timer becomes due. Schedulers compare this
  // against `now` to find re-invocations to dispatch.
  google.protobuf.Timestamp fire_at = 8;
  google.protobuf.Timestamp created_at = 9;
  // Set after the resumed workflow persists a later wake-bearing timer or a
  // terminal workflow record. A due timer remains SCHEDULED until that durable
  // boundary so a crash cannot consume its only wakeup.
  google.protobuf.Timestamp fired_at = 10;
  // Activity paired with TIMER_KIND_ACTIVITY_RETRY. Empty for sleep timers.
  // This reciprocal link lets replay reject two activities that accidentally
  // reuse one caller-supplied retry_timer_id.
  string retry_activity_id = 11;
}

// EventRecord delivers an external signal payload to a waiting workflow.
// Written by external services (webhook handlers, approval flows) via
// `SendEvent` / `PutEvent`. Stored at `event/{event_id}.binpb`.
message EventRecord {
  RecordSchemaVersion schema_version = 1;
  EventKey key = 2;
  // Application-typed payload packed as Any. The waiting workflow declares
  // the expected message type via `WaitEvent`'s payload factory.
  google.protobuf.Any payload = 3;
  google.protobuf.Timestamp received_at = 4;
}

// ClaimRecord coordinates execution between concurrent invocations. Stored
// at `claim/{claim_id}.binpb`. Write semantics depend on the backend's
// `ClaimCapability`.
message ClaimRecord {
  // Field 7 was input_digest (SHA-256 fingerprint). Removed in v0.4: user-
  // supplied IDs are the contract; replay reuses by id, not by input bytes.
  reserved 7;

  RecordSchemaVersion schema_version = 1;
  ClaimKey key = 2;
  // Caller-supplied diagnostic coordination identity. It does not prove
  // liveness or grant re-entry: every existing core claim is busy even when
  // this value matches.
  string owner_id = 3;
  ClaimResourceType resource_type = 4;
  // Domain ID of the resource being claimed (activity_id, timer_id, etc.).
  string resource_id = 5;
  string code_version = 6;
  google.protobuf.Timestamp lease_expires_at = 8;
  google.protobuf.Timestamp created_at = 9;
  // Updated by CAS-capable adapters to extend the lease. Create-only adapters
  // never update this after creation.
  google.protobuf.Timestamp heartbeat_at = 10;
}

// LatestWorkflowRunPointer is a tiny derived object written beside workflow
// records so schedulers can seed from one point GET instead of listing a
// workflow's full run history. The bucket object is best-effort monotonic: a
// lost read/compare/write race can leave it stale, but it must never invent a
// run that does not exist. Bucket stores compare run_order_time, which the
// workflow runtime copies from caller-supplied WorkflowOptions; when it is
// absent they fall back to record_time. Stores never parse opaque run IDs.
message LatestWorkflowRunPointer {
  WorkflowKey key = 1;
  WorkflowStatus status = 2;
  // Timestamp used for best-effort monotonic comparison. For IN_PROGRESS this
  // is the workflow record's created_at; for terminal records it is
  // completed_at.
  google.protobuf.Timestamp record_time = 3;
  // Wall-clock time at which the pointer object was written.
  google.protobuf.Timestamp updated_at = 4;
  // Ordering timestamp used for monotonic comparison. This is the workflow
  // record's caller-supplied run_order_time when present, otherwise
  // record_time.
  google.protobuf.Timestamp run_order_time = 5;
}

// DueTimerEntry is the deterministic write-ahead object written for timer
// transitions. Its full prepared record repairs an interrupted canonical write.
message DueTimerEntry {
  TimerKey key = 1;
  WorkflowKey workflow_key = 2;
  google.protobuf.Timestamp fire_at = 3;
  // Full prepared timer state. The due object is written before the canonical
  // TimerRecord and is its exact fallback if a process dies between writes.
  // Keeping one deterministic entry per TimerKey makes that crash window
  // recoverable without restarting a long sleep from replay time.
  TimerRecord record = 4 [(buf.validate.field).required = true];
}

