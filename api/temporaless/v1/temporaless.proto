// Temporaless v1 protobuf contract.
//
// Temporaless is a storage-first, serverless workflow framework. Workflow runs,
// activity invocations, durable timers, signals (events), and coordination
// claims are all serialized as protobuf records at deterministic flat v2 keys
// under `temporaless/v2/{namespace}/{workflow_id}/{run_id}/...`.
//
// `RecordStoreService` is the cross-language durability contract: point
// get/put/delete, run-scoped lists, latest-run pointer reads, claims, and the
// bucket due-timer ledger. Cross-run search/retention APIs live on the optional
// `RecordQueryService`, implemented by derived indexes.
//
// Edition 2023: lets us declare field-level string defaults (used by
// `ReservedNames` below) so framework-reserved literals like
// "__concurrency__" live ONCE — here — rather than being duplicated in every
// SDK.
edition = "2023";

package temporaless.v1;

import "buf/validate/validate.proto";
import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// File-level: keep proto3-style implicit field presence (scalars generate as
// value types, not pointers). The ReservedNames message below opts back into
// explicit presence on its specific fields so the `[default = "..."]`
// declarations take effect (defaults only fire on fields with explicit
// presence in editions).
option features.field_presence = IMPLICIT;
option go_package = "github.com/jim-technologies/temporaless/core/go/gen/temporaless/v1;temporalessv1";

// WorkflowOptions identifies a single workflow run plus its replay context.
//
// IDs are caller-provided. The framework validates segment-safe ASCII but never
// generates them — the application owns the ID scheme (e.g. `prices:aapl`,
// `tweet:12345`, `llm:answer`).
message WorkflowOptions {
  // Stable identifier for the workflow definition. Reused across runs.
  string workflow_id = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.workflow_id.not_dot_path"
      message: "workflow_id must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.workflow_id.not_system_prefix"
      message: "workflow_id must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  // Opaque identifier for this particular run of the workflow. Schedule
  // adapters commonly derive a deterministic ID from the schedule and fire
  // time so duplicate ticks converge, but the framework never parses it.
  string run_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.run_id.not_dot_path"
      message: "run_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  // Application-supplied build identity (git SHA, release tag, immutable build
  // ID). Bumping it invalidates stored results because the digest changes.
  // Defaults to the `TEMPORALESS_CODE_VERSION` env var, or `dev` when unset.
  string code_version = 3;
  // Caller-supplied identity for workflow-execution, activity, and
  // concurrency-slot claims.
  // Non-empty opts the run into storage-backed single-flight execution and
  // requires a claim store with create-if-absent support. The value is
  // diagnostic identity only: every existing workflow or activity claim is
  // busy even when its owner matches, because two live requests can reuse one
  // worker identity. Temporaless never generates this value. Empty disables
  // claims and therefore cannot be combined with `concurrency_key`.
  string claim_owner_id = 4 [
    (buf.validate.field).string = {pattern: "^$|^[A-Za-z0-9._:=-]+$"},
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.claim_owner_id.not_dot_path"
      message: "claim_owner_id must not be . or .."
      expression: "this == '' || (this != '.' && this != '..')"
    }
  ];
  // Pre-emptive cluster-wide concurrency cap key. When non-empty, the runtime
  // acquires one of `concurrency_limit` slot claims under this key before
  // executing the workflow body; if all slots are taken, raises
  // ConcurrencyBusyError (mapped to RESOURCE_EXHAUSTED at the gRPC boundary).
  // The slot is held only during an in-flight invocation: durable timer
  // pending / event pending / claim busy releases the slot so other workflows
  // can run; the resumed invocation re-acquires on its next entry.
  //
  // Use this for vendor rate-limit pre-emption: every workflow sharing
  // `concurrency_key="vendor:openai"` with `concurrency_limit=5` has at most
  // 5 active invocations cluster-wide, regardless of how many worker replicas
  // are dispatching. Pair with `RetryPolicy.durable_backoff_threshold` and
  // `ActivityFailure.retry_after` for the full vendor-friendly story.
  //
  // Empty disables concurrency capping (the default). When set, must be
  // path-safe and `concurrency_limit` must be > 0.
  string concurrency_key = 5 [
    (buf.validate.field).string = {pattern: "^$|^[A-Za-z0-9._:=-]+$"},
    (buf.validate.field).cel = {
      id: "temporaless.workflow_options.concurrency_key.not_dot_path"
      message: "concurrency_key must not be . or .."
      expression: "this == '' || (this != '.' && this != '..')"
    }
  ];
  // Maximum number of concurrent in-flight workflow invocations sharing
  // `concurrency_key`. Must be > 0 when `concurrency_key` is set; must be 0
  // when `concurrency_key` is empty.
  uint32 concurrency_limit = 6;
  option (buf.validate.message).cel = {
    id: "temporaless.workflow_options.concurrency_key_limit_paired"
    message: "concurrency_key and concurrency_limit must both be set or both empty"
    expression: "(this.concurrency_key == '' && this.concurrency_limit == 0u) || (this.concurrency_key != '' && this.concurrency_limit > 0u)"
  };
  option (buf.validate.message).cel = {
    id: "temporaless.workflow_options.concurrency_requires_claim_owner"
    message: "claim_owner_id must be set when concurrency_key is set"
    expression: "this.concurrency_key == '' || this.claim_owner_id != ''"
  };
  // Caller-supplied logical ordering time for this run. Schedule adapters set
  // this to the scheduled fire time so a later-created backfill cannot replace
  // the latest-run pointer for a newer fire. When unset, stores use the
  // workflow record's lifecycle time. The framework never derives this value
  // from run_id because run IDs are opaque application-owned identifiers.
  google.protobuf.Timestamp run_order_time = 7;
}

// ActivityOptions controls how a single activity executes within a workflow.
message ActivityOptions {
  // Stable identifier for the activity within its workflow run. Authoring
  // responsibility: must be deterministic across replays of the same logical
  // step (e.g. `fetch:aapl`, `normalize:tweet`, `llm:complete`). This ID is the
  // de-duplication contract: reusing it replays the stored result even if new
  // input bytes differ. Use a distinct ID for a distinct execution.
  string activity_id = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.id.activity_id.not_dot_path"
      message: "activity_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  // Optional retry policy. When unset, the activity runs at most once.
  RetryPolicy retry_policy = 2;
  // Stable caller-supplied ID for the durable timer used between activity
  // attempts. Required when retry_policy enables durable backoff. It must be
  // deterministic across replays of the same logical activity. The framework
  // does not derive a timer ID from activity_id.
  string retry_timer_id = 3 [
    (buf.validate.field).string = {pattern: "^$|^[A-Za-z0-9._:=-]+$"},
    (buf.validate.field).cel = {
      id: "temporaless.activity_options.retry_timer_id.not_dot_path"
      message: "retry_timer_id must not be . or .."
      expression: "this == '' || (this != '.' && this != '..')"
    }
  ];
  option (buf.validate.message).cel = {
    id: "temporaless.activity_options.durable_retry_timer_id_required"
    message: "retry_timer_id is required when retry_policy enables durable backoff"
    expression: "!has(this.retry_policy) || this.retry_policy.maximum_attempts <= 1 || !has(this.retry_policy.durable_backoff_threshold) || this.retry_policy.durable_backoff_threshold <= duration('0s') || this.retry_timer_id != ''"
  };
}

// DispatchOptions configures an in-process fire-and-forget dispatcher (the
// `dispatch` adapter in each SDK). Native runtime knobs that can't be
// expressed as data — the `OnError` hook, the pluggable `Queue` adapter for
// Kafka/Rabbit/etc. — stay language-local on the dispatcher constructor;
// only the serializable config lives here so it can be loaded from a
// config file / env / CLI flag uniformly across Go, Python, and Rust.
message DispatchOptions {
  // How long `Shutdown` waits for in-flight handlers to drain before
  // cancelling them. Unset / zero falls back to the SDK default of 15s
  // (matches common SIGTERM grace periods — Kubernetes preStop /
  // terminationGracePeriodSeconds).
  google.protobuf.Duration drain_timeout = 1;
  // Cap on concurrent handlers. When > 0, `DoAsync` blocks until a slot
  // frees up — natural backpressure for bursty callers. Zero (the
  // default) leaves the pool unbounded: one task per `DoAsync` call, no
  // submission-side blocking.
  //
  // Typical starting points: 2× CPU cores for compute-bound handlers,
  // 100–1000 for I/O-bound handlers depending on per-call latency and
  // downstream rate limits.
  uint32 max_inflight = 2;
  // How long completed (DONE/FAILED) task records stay queryable via
  // `Status(taskID)` before the GC sweep evicts them. Zero falls back
  // to the SDK default of 1 hour. In-flight (PENDING/RUNNING) records
  // never evict — only terminal ones age out. To disable tracking
  // entirely is intentionally not exposed: it's the framework's
  // opinionated default, the cost is one map entry per submission.
  google.protobuf.Duration task_ttl = 3;
}

// TaskStatus mirrors the lifecycle of one `DoAsync` submission.
// UNSPECIFIED is the zero value and is what `Status(taskID)` returns
// for unknown / TTL-evicted ids — distinguish "no such task" from a
// real terminal state.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  // Queued on the dispatcher; not yet picked up by a worker goroutine.
  TASK_STATUS_PENDING = 1;
  // A worker is actively running the handler.
  TASK_STATUS_RUNNING = 2;
  // The handler returned (resp, nil); `TaskInfo.response` is populated.
  TASK_STATUS_DONE = 3;
  // The handler returned a non-nil error; `TaskInfo.error` is populated.
  TASK_STATUS_FAILED = 4;
}

// TaskInfo is the per-submission lifecycle record the dispatcher tracks
// in memory and exposes via `Dispatcher.Status(taskID)`. Successful
// handler responses are wrapped in `google.protobuf.Any` so callers can
// unpack into the original concrete type without the dispatcher needing
// to know it.
message TaskInfo {
  string task_id = 1;
  string method = 2;
  TaskStatus status = 3;
  // Populated when status == TASK_STATUS_DONE. Carries the handler's
  // typed Resp marshaled into Any (use `any.UnmarshalTo(&YourResp{})`).
  google.protobuf.Any response = 4;
  // Populated when status == TASK_STATUS_FAILED.
  string error = 5;
  google.protobuf.Timestamp submitted_at = 6;
  // Set when status transitions to DONE or FAILED. Used as the TTL
  // anchor for eviction.
  google.protobuf.Timestamp completed_at = 7;
}

// RetryPolicy controls retry behavior for a single activity. Short waits stay
// in-process; waits meeting durable_backoff_threshold use durable timers.
//
// Failures matched by `non_retryable_error_codes` short-circuit the loop and
// surface immediately. Between attempts, the runtime persists an
// `ActivityRecord` with status `ACTIVITY_STATUS_RETRYING` so a process death
// during the backoff sleep doesn't lose the attempt history.
message RetryPolicy {
  // Wait before the second attempt. Required when `maximum_attempts > 1`.
  google.protobuf.Duration initial_interval = 1 [(buf.validate.field).duration.gte = {}];
  // Multiplier applied to the previous interval to compute the next. Zero is
  // treated as 1.0 (linear, no growth). Typical value: 2.0.
  double backoff_coefficient = 2 [(buf.validate.field).double = {
    gte: 0
    finite: true
  }];
  // Cap on backoff growth. Zero means uncapped.
  google.protobuf.Duration maximum_interval = 3 [(buf.validate.field).duration.gte = {}];
  // Total attempts including the initial one. Must be > 0 when a policy is
  // set; an unset policy implies a single attempt.
  uint32 maximum_attempts = 4 [(buf.validate.field).uint32.gt = 0];
  // Activity error codes (carried via `ActivityFailure.code`) that should
  // skip remaining retries and surface the failure immediately.
  repeated string non_retryable_error_codes = 5;
  // When the next backoff interval is at least this long, persist the retry
  // as a durable timer instead of sleeping in-process. The activity record is
  // written as `ACTIVITY_STATUS_RETRYING` with `next_attempt_at` set, a paired
  // `TIMER_KIND_ACTIVITY_RETRY` timer is scheduled at the same instant, and
  // the runtime returns the typed pending error so the workflow stays
  // IN_PROGRESS. The bundled timer scanner re-invokes the workflow after
  // `fire_at` and the retry loop resumes from the next attempt.
  //
  // Zero (the default) keeps the legacy in-process behavior: every retry
  // sleeps inside the activity. Set this to ~30s for LLM workflows whose
  // rate-limit windows often exceed a serverless function's max duration.
  google.protobuf.Duration durable_backoff_threshold = 6 [(buf.validate.field).duration.gte = {}];

  option (buf.validate.message).cel = {
    id: "temporaless.retry_policy.initial_interval_required"
    message: "initial_interval must be > 0 when maximum_attempts > 1"
    expression: "this.maximum_attempts <= 1 || (has(this.initial_interval) && this.initial_interval > duration('0s'))"
  };
}

// ActivityStatus tracks an activity's lifecycle in storage.
enum ActivityStatus {
  ACTIVITY_STATUS_UNSPECIFIED = 0;
  // Activity returned a result. The `result` field carries the response.
  ACTIVITY_STATUS_COMPLETED = 1;
  // Activity exhausted retries. The `failure` field carries the terminal
  // error; `attempts` carries the full per-attempt history. Replay surfaces
  // this failure to the workflow.
  ACTIVITY_STATUS_FAILED = 2;
  // Intermediate state between attempts: persisted after a failed attempt
  // that still has retries remaining, so a re-invocation can resume from
  // `len(attempts) + 1` instead of restarting from attempt 1.
  ACTIVITY_STATUS_RETRYING = 3;
}

// WorkflowStatus tracks a workflow run's lifecycle in storage.
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  // Workflow returned a result.
  WORKFLOW_STATUS_COMPLETED = 1;
  // Workflow body returned a non-pending error. Replay surfaces the failure.
  WORKFLOW_STATUS_FAILED = 2;
  // Workflow body started but did not return a terminal result — typically
  // because it returned a typed pending error (timer, claim busy, event
  // pending). The next invocation re-executes the body.
  WORKFLOW_STATUS_IN_PROGRESS = 3;
}

// TimerStatus tracks the lifecycle of a durable sleep timer.
enum TimerStatus {
  TIMER_STATUS_UNSPECIFIED = 0;
  // Timer is waiting for `fire_at`. The workflow returned `ErrTimerPending`
  // and should be re-invoked after `fire_at`.
  TIMER_STATUS_SCHEDULED = 1;
  // Timer's `fire_at` has passed and a resumed workflow has committed a later
  // durable wake or terminal outcome, so this wake is no longer needed.
  TIMER_STATUS_FIRED = 2;
  // Timer was canceled before firing. Replay treats this as a conflict.
  TIMER_STATUS_CANCELED = 3;
}

// TimerKind discriminates timer record uses.
enum TimerKind {
  TIMER_KIND_UNSPECIFIED = 0;
  // Plain durable sleep written by `workflow.Sleep`.
  TIMER_KIND_SLEEP = 1;
  // Paired with a RETRYING ActivityRecord: the runtime persisted a long retry
  // backoff as a durable timer instead of sleeping in-process. When the timer
  // is due, the workflow re-invokes and the activity's retry loop resumes
  // from the next attempt. Its timer ID is supplied explicitly through
  // ActivityOptions.retry_timer_id.
  TIMER_KIND_ACTIVITY_RETRY = 2;
}

// ReservedNames is the canonical source of framework-reserved string
// literals — workflow_ids and claim_id prefixes — that both
// SDKs use to namespace runtime state. The values live HERE (via Edition
// 2023 field defaults) so that:
//
//   1. Every SDK reads them from the same place via generated code:
//      Go:     (&pb.ReservedNames{}).GetConcurrencyWorkflowId()
//      Python: pb.ReservedNames().concurrency_workflow_id
//      Future invariantprotocol-generated CLI/MCP pick them up automatically.
//
//   2. Renaming or evolving any reserved string is a one-line proto change
//      + regenerate; no parallel SDK constants can drift.
//
// Never instantiated as a wire-format message — read defaults from a fresh
// zero-value instance.
message ReservedNames {
  // Synthetic workflow_id under which concurrency-key slot claims are
  // stored. User-supplied workflow IDs identical to this value collide with
  // framework state — document as reserved.
  string concurrency_workflow_id = 1 [
    features.field_presence = EXPLICIT,
    default = "__concurrency__"
  ];

  // Deprecated compatibility literal retained so the pre-v1 protobuf API
  // remains wire/source compatible with v0.4. Runtime retry timer IDs are now
  // supplied explicitly through ActivityOptions.retry_timer_id and this value
  // is no longer consulted by either first-class SDK.
  string activity_retry_timer_id_prefix = 2 [
    deprecated = true,
    features.field_presence = EXPLICIT,
    default = "activity-retry:"
  ];

  // Prefix for concurrency slot claim_ids. Combined with a slot index
  // (`slot:0`, `slot:1`, ...) by the runtime.
  string concurrency_slot_id_prefix = 3 [
    features.field_presence = EXPLICIT,
    default = "slot:"
  ];

  // Claim ID used to serialize live invocations of one workflow run. The
  // surrounding ClaimKey already contains workflow_id and run_id, so this
  // literal is identical for every run.
  string workflow_execution_claim_id = 4 [
    features.field_presence = EXPLICIT,
    default = "workflow:execution"
  ];

  // Prefix for claims that serialize one activity_id within a workflow run.
  // The activity_id is appended verbatim; the surrounding ClaimKey already
  // carries namespace, workflow_id, and run_id.
  string activity_claim_id_prefix = 5 [
    features.field_presence = EXPLICIT,
    default = "activity:"
  ];
}

// RuntimeDefaults is the canonical source for cross-language defaults that
// affect persisted records. Like ReservedNames, SDKs read Edition 2023 field
// defaults from a fresh zero-value instance rather than serializing this
// message.
message RuntimeDefaults {
  // Diagnostic expiry recorded on create-only claims. The current core does
  // not use this timestamp for automatic takeover: without CAS refresh,
  // owner-conditioned delete, and fenced writes, expiry is only operator
  // information and stale claims require verified manual cleanup.
  uint32 claim_lease_duration_seconds = 1 [
    features.field_presence = EXPLICIT,
    default = 900
  ];
}

// RecordSchemaVersion identifies the record family. Each protobuf record sets
// this to allow forward-compatible decoding.
enum RecordSchemaVersion {
  RECORD_SCHEMA_VERSION_UNSPECIFIED = 0;
  RECORD_SCHEMA_VERSION_ACTIVITY = 1;
  RECORD_SCHEMA_VERSION_WORKFLOW = 2;
  RECORD_SCHEMA_VERSION_TIMER = 3;
  RECORD_SCHEMA_VERSION_CLAIM = 4;
  RECORD_SCHEMA_VERSION_EVENT = 5;
}

// ClaimResourceType identifies what kind of work a claim coordinates.
enum ClaimResourceType {
  CLAIM_RESOURCE_TYPE_UNSPECIFIED = 0;
  CLAIM_RESOURCE_TYPE_WORKFLOW = 1;
  CLAIM_RESOURCE_TYPE_ACTIVITY = 2;
  CLAIM_RESOURCE_TYPE_TIMER = 3;
  // Cluster-wide concurrency-cap slot. The framework writes one claim record
  // per slot index (0..concurrency_limit-1) under workflow_id=__concurrency__,
  // run_id=<concurrency_key>. A workflow.Run holds one of these for the
  // duration of an invocation and releases it on every orderly exit. See
  // WorkflowOptions.concurrency_key.
  CLAIM_RESOURCE_TYPE_CONCURRENCY_KEY = 4;
}

// ClaimCapability declares what the configured claim store can do. Adapters
// must report this honestly via `GetStoreCapabilities`.
enum ClaimCapability {
  CLAIM_CAPABILITY_UNSPECIFIED = 0;
  // No claim coordination. Options that require claims are rejected; callers
  // that omit those options run workflow and activity work with at-least-once
  // semantics and must keep side effects idempotent.
  CLAIM_CAPABILITY_NO_CLAIMS = 1;
  // Storage supports atomic create-if-absent. When the caller enables claims,
  // they prevent concurrent execution within a run but cannot safely take
  // over stale claims.
  CLAIM_CAPABILITY_CREATE_ONLY_CLAIMS = 2;
  // Reserved for a store/protocol that supports version-conditioned refresh,
  // release, and stale-claim takeover. The current core claim RPCs do not yet
  // expose those CAS operations.
  CLAIM_CAPABILITY_CAS_CLAIMS = 3;
}

// WorkflowKey addresses a single workflow run.
//
// V2 object storage reserves namespace and workflow_id values beginning with
// "_" for system prefixes such as "_latest" and "_due". Runtime key validation
// rejects those values for application record keys; framework-owned claim keys
// may use reserved workflow_ids such as "__concurrency__".
message WorkflowKey {
  string namespace = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.namespace.not_dot_path"
      message: "namespace must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.namespace.not_system_prefix"
      message: "namespace must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  string workflow_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.workflow_id.not_dot_path"
      message: "workflow_id must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.workflow_id.not_system_prefix"
      message: "workflow_id must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  string run_id = 3 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.workflow_key.run_id.not_dot_path"
      message: "run_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
}

// ActivityKey addresses a single activity invocation within a workflow run.
message ActivityKey {
  string namespace = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.namespace.not_dot_path"
      message: "namespace must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.namespace.not_system_prefix"
      message: "namespace must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  string workflow_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.workflow_id.not_dot_path"
      message: "workflow_id must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.workflow_id.not_system_prefix"
      message: "workflow_id must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  string run_id = 3 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.run_id.not_dot_path"
      message: "run_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
  string activity_id = 4 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.activity_key.activity_id.not_dot_path"
      message: "activity_id must not be . or .."
      expression: "this != '.' && this != '..'"
    }
  ];
}

// TimerKey addresses a single durable timer within a workflow run.
message TimerKey {
  string namespace = 1 [
    (buf.validate.field).string = {
      min_len: 1
      pattern: "^[A-Za-z0-9._:=-]+$"
    },
    (buf.validate.field).cel = {
      id: "temporaless.timer_key.namespace.not_dot_path"
      message: "namespace must not be . or .."
      expression: "this != '.' && this != '..'"
    },
    (buf.validate.field).cel = {
      id: "temporaless.timer_key.namespace.not_system_prefix"
      message: "namespace must not start with _"
      expression: "!this.startsWith('_')"
    }
  ];
  string workflow_id = 2 [
    (buf.validate.field).string = {
      min_len: 1
