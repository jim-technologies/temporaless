// ActivityFailure is the typed error surface that retry policies match on.
message ActivityFailure {
  // Stable identifier the user supplies (e.g. `rate_limited`, `invalid_argument`,
  // `upstream_5xx`). Empty when the error did not carry a typed code.
  string code = 1;
  // Human-readable description of the failure.
  string message = 2;
}

// ActivityAttempt is one invocation of the activity body within a retry loop.
message ActivityAttempt {
  // 1-indexed attempt counter.
  uint32 attempt = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp completed_at = 3;
  // Set when the attempt failed; absent when the attempt succeeded.
  ActivityFailure failure = 4;
}

// ActivityRecord captures everything the runtime needs to replay or resume an
// activity. Stored at `activities/{activity_id}.binpb` under the workflow run.
message ActivityRecord {
  RecordSchemaVersion schema_version = 1;
  ActivityKey key = 2;
  // Derived from the request and response message types — used for replay
  // fingerprinting alongside `code_version` and `input_digest`.
  string activity_type = 3;
  string code_version = 4;
  // Hex-encoded SHA-256 over the deterministic protobuf input bytes plus the
  // execution kind, type, and code version. Mismatch on replay is a hard error.
  string input_digest = 5;
  google.protobuf.Any input = 6;
  ActivityStatus status = 7;
  // Set when status is COMPLETED.
  google.protobuf.Any result = 8;
  // Set when status is FAILED.
  ActivityFailure failure = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp completed_at = 11;
  // Per-attempt history. Always carries every attempt the runtime has run so
  // far, including the one that produced the current `status`.
  repeated ActivityAttempt attempts = 12;
  // Application-supplied structured metadata (model, tokens, vendor, etc.)
  // attached via `workflow.Annotate` from inside the activity body.
  map<string, string> annotations = 13;
  // Wall-clock instant at which the runtime should resume a durable retry.
  // Only set when status is `ACTIVITY_STATUS_RETRYING` and the policy's
  // `durable_backoff_threshold` was exceeded — the runtime paired this record
  // with a `TIMER_KIND_ACTIVITY_RETRY` timer. When unset on a RETRYING record,
  // the retry was in-process (legacy / threshold = 0) and replay resumes
  // immediately if a backing scanner re-invokes the workflow.
  google.protobuf.Timestamp next_attempt_at = 14;
}

// WorkflowRecord captures workflow lifecycle state. Stored at `workflow.binpb`
// under the workflow run.
message WorkflowRecord {
  RecordSchemaVersion schema_version = 1;
  WorkflowKey key = 2;
  string workflow_type = 3;
  string code_version = 4;
  string input_digest = 5;
  google.protobuf.Any input = 6;
  WorkflowStatus status = 7;
  // Set when status is COMPLETED.
  google.protobuf.Any result = 8;
  // Set when status is FAILED.
  ActivityFailure failure = 9;
  google.protobuf.Timestamp created_at = 10;
  // Set when the workflow has reached a terminal status (COMPLETED or FAILED).
  google.protobuf.Timestamp completed_at = 11;
  // Annotations attached via `workflow.Annotate` from within the workflow body
  // (between activity calls). Activity-scope annotations live on the
  // ActivityRecord instead.
  map<string, string> annotations = 12;
}

// TimerRecord backs `workflow.Sleep`. Stored at `timers/{timer_id}.binpb`.
message TimerRecord {
  RecordSchemaVersion schema_version = 1;
  TimerKey key = 2;
  TimerKind timer_kind = 3;
  string code_version = 4;
  string input_digest = 5;
  // Original duration the workflow body asked to sleep for.
  google.protobuf.Duration duration = 6;
  TimerStatus status = 7;
  // Wall-clock instant at which the timer becomes due. Schedulers compare this
  // against `now` to find re-invocations to dispatch.
  google.protobuf.Timestamp fire_at = 8;
  google.protobuf.Timestamp created_at = 9;
  // Set when the workflow re-invocation consumed the timer.
  google.protobuf.Timestamp fired_at = 10;
}

// EventRecord delivers an external signal payload to a waiting workflow.
// Written by external services (webhook handlers, approval flows) via
// `SendEvent` / `PutEvent`. Stored at `events/{event_id}.binpb`.
message EventRecord {
  RecordSchemaVersion schema_version = 1;
  EventKey key = 2;
  // Application-typed payload packed as Any. The waiting workflow declares
  // the expected message type via `WaitEvent`'s payload factory.
  google.protobuf.Any payload = 3;
  google.protobuf.Timestamp received_at = 4;
}

// ClaimRecord coordinates execution between concurrent invocations. Stored
// at `claims/{claim_id}.binpb`. Write semantics depend on the backend's
// `ClaimCapability`.
message ClaimRecord {
  RecordSchemaVersion schema_version = 1;
  ClaimKey key = 2;
  // Caller-supplied identity. The runtime checks this on resume to confirm
  // that the resumer owns the claim.
  string owner_id = 3;
  ClaimResourceType resource_type = 4;
  // Domain ID of the resource being claimed (activity_id, timer_id, etc.).
  string resource_id = 5;
  string code_version = 6;
  string input_digest = 7;
  google.protobuf.Timestamp lease_expires_at = 8;
  google.protobuf.Timestamp created_at = 9;
  // Updated by CAS-capable adapters to extend the lease. Create-only adapters
  // never update this after creation.
  google.protobuf.Timestamp heartbeat_at = 10;
}

message GetWorkflowRequest {
  WorkflowKey key = 1;
}

message GetWorkflowResponse {
  // False when no record exists for the key. Read this before assuming
  // `record` is populated.
  bool found = 1;
  WorkflowRecord record = 2;
}

message PutWorkflowRequest {
  WorkflowRecord record = 1;
}

message PutWorkflowResponse {}

message GetTimerRequest {
  TimerKey key = 1;
}

message GetTimerResponse {
  bool found = 1;
  TimerRecord record = 2;
}

message PutTimerRequest {
  TimerRecord record = 1;
}

message PutTimerResponse {}

message GetActivityRequest {
  ActivityKey key = 1;
}

message GetActivityResponse {
  bool found = 1;
