}

message PutEventRequest {
  EventRecord record = 1;
}

message PutEventResponse {}

// ListWorkflowsRequest filters by namespace, workflow_id, and status.
message ListWorkflowsRequest {
  // Empty namespace lists across all namespaces.
  string namespace = 1;
  // UNSPECIFIED matches all statuses. Use specific statuses to find in-flight
  // (`WORKFLOW_STATUS_IN_PROGRESS`) or failed (`WORKFLOW_STATUS_FAILED`) runs.
  WorkflowStatus status = 2;
  // Empty workflow_id lists across all workflow_ids in the namespace(s).
  // Setting this scopes the storage-level walk to a single workflow's runs,
  // which is much faster than listing everything and filtering client-side.
  string workflow_id = 3;
}

message ListWorkflowsResponse {
  repeated WorkflowRecord records = 1;
}

// ListActivitiesRequest scopes to a single workflow run.
message ListActivitiesRequest {
  WorkflowKey key = 1;
}

message ListActivitiesResponse {
  repeated ActivityRecord records = 1;
}

// ListTimersRequest scopes to a single workflow run, optionally filtering by
// timer status (e.g. `TIMER_STATUS_SCHEDULED` to find pending timers).
message ListTimersRequest {
  WorkflowKey key = 1;
  // UNSPECIFIED matches all statuses.
  TimerStatus status = 2;
}

message ListTimersResponse {
  repeated TimerRecord records = 1;
}

// ListEventsRequest scopes to a single workflow run.
message ListEventsRequest {
  WorkflowKey key = 1;
}

message ListEventsResponse {
  repeated EventRecord records = 1;
}

// DeleteWorkflowRequest removes only the workflow record. Activities, timers,
// events, and claims under the run are left intact — call the corresponding
// Delete* RPCs or use a higher-level adapter (e.g. `janitor.Sweep`) for
// recursive deletion.
message DeleteWorkflowRequest {
  WorkflowKey key = 1;
}

message DeleteWorkflowResponse {
  // True if the record existed and was removed; false if it was already gone
  // (idempotent).
  bool deleted = 1;
}

message DeleteActivityRequest {
  ActivityKey key = 1;
}

message DeleteActivityResponse {
  bool deleted = 1;
}

message DeleteTimerRequest {
  TimerKey key = 1;
}

message DeleteTimerResponse {
  bool deleted = 1;
}

message DeleteEventRequest {
  EventKey key = 1;
}

message DeleteEventResponse {
  bool deleted = 1;
}

message GetClaimRequest {
  ClaimKey key = 1;
}

message GetClaimResponse {
  bool found = 1;
  ClaimRecord record = 2;
}

// TryCreateClaimRequest writes the claim record only if no claim exists at the
// key. Other write semantics (refresh, takeover) are exposed via separate
// adapter APIs only when the backend's `ClaimCapability` allows them.
message TryCreateClaimRequest {
  ClaimRecord record = 1;
}

message TryCreateClaimResponse {
  // True if the claim was created; false if a claim already existed at the key.
  bool created = 1;
}

message GetStoreCapabilitiesRequest {}

message GetStoreCapabilitiesResponse {
  // What the configured claim store can do. Callers should treat
  // `CLAIM_CAPABILITY_NO_CLAIMS` as "no coordination available — use external
  // idempotency keys for side effects".
  ClaimCapability claim_capability = 1;
}

// SweepRequest deletes every COMPLETED workflow run whose `completed_at` is
// older than `now - max_age`. Activities, timers, and events under each swept
// run are deleted before the workflow record itself.
message SweepRequest {
  // Namespace to scope the sweep to. Empty means "all namespaces".
  string namespace = 1;
  // Reference time. Operators pass the current wall clock; backends compare
  // each record's `completed_at` against `now - max_age`. Required so the RPC
  // is deterministic — no implicit server-side clocks.
  google.protobuf.Timestamp now = 2;
  // Minimum age for a COMPLETED run to be eligible for deletion.
  google.protobuf.Duration max_age = 3;
}

message SweepResponse {
  // Number of COMPLETED workflow runs deleted (and their children swept).
  uint32 deleted = 1;
}

// DueTimer pairs a timer record with the workflow that owns it. Returned by
// `DueTimers` so callers can re-invoke the parent workflow when its sleep is
// up.
message DueTimer {
  TimerKey key = 1;
  TimerRecord record = 2;
  WorkflowRecord workflow = 3;
}

// DueTimersRequest finds SCHEDULED timer records whose `fire_at` is at or
// before `now` and whose parent workflow is still IN_PROGRESS. Used by the
// timer-scanner adapter to re-invoke workflows after a durable sleep.
message DueTimersRequest {
  // Namespace to scope the scan to. Empty means "all namespaces".
  string namespace = 1;
  // Reference time. Timers with `fire_at <= now` and status=SCHEDULED are
  // returned.
  google.protobuf.Timestamp now = 2;
}

message DueTimersResponse {
  repeated DueTimer due = 1;
}

// RecordStoreService is the cross-language storage contract.
//
// Every record kind (workflow, activity, timer, event, claim) supports
// Get/Put. Workflow / activity / timer / event additionally support List + Delete.
// Claims have specialized creation semantics (`TryCreateClaim`) and intentionally
// no Delete in V1 — they are write-once for create-only adapters.
//
// Backends implement this same surface so generated CLI / gRPC / HTTP / MCP
// wrappers all see the same operations regardless of where records live.
service RecordStoreService {
  // Report what the configured store can do (claim coordination tier, etc.).
  rpc GetStoreCapabilities(GetStoreCapabilitiesRequest) returns (GetStoreCapabilitiesResponse);

  // Read a single workflow record by key.
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  // Write or replace a single workflow record.
  rpc PutWorkflow(PutWorkflowRequest) returns (PutWorkflowResponse);

  // Read a single durable timer record by key.
  rpc GetTimer(GetTimerRequest) returns (GetTimerResponse);
  // Write or replace a single timer record.
  rpc PutTimer(PutTimerRequest) returns (PutTimerResponse);

  // Read a single activity record by key.
  rpc GetActivity(GetActivityRequest) returns (GetActivityResponse);
  // Write or replace a single activity record.
  rpc PutActivity(PutActivityRequest) returns (PutActivityResponse);

  // Read a single coordination claim by key.
  rpc GetClaim(GetClaimRequest) returns (GetClaimResponse);
  // Write a claim only if none already exists at the key. Returns `created=false`
  // when the key is taken; callers compare `owner_id` to decide ClaimBusy vs.
  // safe-to-resume.
  rpc TryCreateClaim(TryCreateClaimRequest) returns (TryCreateClaimResponse);

  // Read a single signal/event record by key.
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  // Deliver a signal payload to a waiting workflow. External services
  // (webhooks, approvals) call this to wake up a `WaitEvent`.
  rpc PutEvent(PutEventRequest) returns (PutEventResponse);

  // List workflow records, optionally filtered by namespace and status.
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  // List all activity records under a single workflow run.
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  // List timer records under a single workflow run, optionally filtered by status.
  rpc ListTimers(ListTimersRequest) returns (ListTimersResponse);
  // List event records under a single workflow run.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);

  // Idempotently remove a workflow record. Children (activities/timers/events/claims)
  // are not touched; use list+delete or `janitor.Sweep` for recursive cleanup.
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  // Idempotently remove an activity record so the next `ExecuteActivity`
  // re-executes the activity body.
  rpc DeleteActivity(DeleteActivityRequest) returns (DeleteActivityResponse);
  // Idempotently remove a timer record.
  rpc DeleteTimer(DeleteTimerRequest) returns (DeleteTimerResponse);
  // Idempotently remove an event record. Resets a delivered signal so
  // `WaitEvent` returns pending again on the next workflow invocation.
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);

  // Sweep COMPLETED workflow runs older than `max_age`, deleting their
  // activities, timers, and events first. The retention story for the
  // storage-first model — operators run this on a daily cron. Idempotent;
  // returns the number of runs deleted.
  rpc Sweep(SweepRequest) returns (SweepResponse);

  // Find SCHEDULED durable timers whose `fire_at <= now` and whose parent
  // workflow is still IN_PROGRESS. Operators run this on a minute cron and
  // re-invoke the workflow handler for each entry, which lets a stored
  // `Workflow.Sleep` resume.
  rpc DueTimers(DueTimersRequest) returns (DueTimersResponse);
}
