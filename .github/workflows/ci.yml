name: ci

on:
  push:
    branches: [main]
    # Run every tag so the version gate can reject language-/SDK-prefixed tags
    # instead of silently leaving them unchecked.
    tags: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # Release-tag verification must never be canceled by another push.
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

jobs:
  gate:
    name: full-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install TypeScript dependencies
        run: npm ci

      - name: Install Flox
        uses: flox/install-flox-action@3b80351ae97bbe063f264dc88fbd505507054963 # v2.5.3

      # Generated proto files are committed (see core/go/gen and
      # core/py/src/temporaless/v1). Only a push to the designated main branch
      # receives the BSR credential. Tag verification intentionally accepts
      # every tag name, and workflow_dispatch can target another ref, so
      # neither is a sufficient trust boundary for a repository secret. Keep
      # this command isolated so npm scripts, Go tools/tests, Rust, Python
      # tests, and pull-request code cannot inherit BUF_TOKEN. The local Python
      # generator explicitly strips it too.
      - name: Regenerate protobuf sources
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: flox activate -- buf generate

      - name: Verify protobuf regeneration is clean
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          # protoc-gen-connectrpc-py 0.11.1 currently emits trailing spaces on
          # generated optional-header parameters. Match scripts/check.
          sed -i 's/[[:space:]]*$//' core/py/src/temporaless/v1/temporaless_connect.py
          git diff --exit-code -- \
            api \
            core/go/gen \
            core/py/src/buf \
            core/py/src/temporaless/v1 \
            core/ts/src/gen
          generated_untracked="$(git ls-files --others --exclude-standard -- \
            api \
            core/go/gen \
            core/py/src/buf \
            core/py/src/temporaless/v1 \
            core/ts/src/gen)"
          if [ -n "$generated_untracked" ]; then
            echo "Buf generation produced untracked files:" >&2
            echo "$generated_untracked" >&2
            exit 1
          fi

      # Pull requests and the secret-free full gate validate the checked-in
      # descriptor and compile/test every generated consumer. The main-branch
      # push additionally proves that a trusted regeneration is clean before a
      # release tag points at that commit.
      - name: Run gate
        run: flox activate -- scripts/check

  go-build:
    # Quick parallel build so a Go-only typo surfaces while the full gate is
    # still running. Flox supplies Go and libffi consistently with local dev.
    name: go-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Flox
        uses: flox/install-flox-action@3b80351ae97bbe063f264dc88fbd505507054963 # v2.5.3
      - run: flox activate -- go build ./...
      - run: flox activate -- go vet ./...

  go-check:
    # Go-only gate (gofmt-check + vet + golangci-lint + race tests) via the
    # top-level Makefile. Go comes from Flox; golangci-lint is a pinned Go tool.
    name: go-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install Flox
        uses: flox/install-flox-action@3b80351ae97bbe063f264dc88fbd505507054963 # v2.5.3
      - name: make check
        run: flox activate -- make check

  rust-check:
    # Rust is experimental and deliberately outside the first-class Flox
    # environment. Keep it independently reproducible and mandatory in CI.
    name: rust-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  security-check:
    name: security-check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0

      - name: Install Flox
        uses: flox/install-flox-action@3b80351ae97bbe063f264dc88fbd505507054963 # v2.5.3

      - name: Audit npm lockfile
        run: npm audit --audit-level=moderate

      - name: Audit Go dependency reachability
        run: flox activate -- go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Audit Python environments
        shell: bash
        run: |
          set -euo pipefail
          for project in \
            core/py \
            adapters/py/connectworkflow \
            adapters/py/indexstore \
            adapters/py/prefectcompat \
            adapters/py/temporalcompat
          do
            flox activate -- uv run --project "$project" \
              --with "pip-audit==2.10.1" \
              pip-audit --local --progress-spinner=off
          done

      - name: Audit Rust lockfile
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked --version 0.22.1
          cargo audit --file Cargo.lock

      - name: Scan Git history for secrets
        run: |
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            zricethezav/gitleaks:v8.28.0@sha256:cdbb7c955abce02001a9f6c9f602fb195b7fadc1e812065883f695d1eeaba854 \
            git /repo --no-banner --redact=100

  git-install:
    # Package every SDK from an immutable Git commit on an isolated runner.
    # Per-SDK runners prevent large Python, Go, Rust, and npm caches from
    # competing for the same ephemeral disk. A local bare origin keeps the
    # source exact for pull-request merge commits too, which are not guaranteed
    # to be fetchable by raw SHA from the public repository URL.
    name: git-sha-install-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        sdk: [python, go, rust, npm]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: matrix.sdk == 'npm'
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        if: matrix.sdk == 'rust'
        with:
          toolchain: 1.97.0

      - name: Install Flox
        if: matrix.sdk == 'python' || matrix.sdk == 'go'
        uses: flox/install-flox-action@3b80351ae97bbe063f264dc88fbd505507054963 # v2.5.3

      - name: Create immutable Git source
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          source_repo="$RUNNER_TEMP/temporaless.git"
          git clone --bare "$GITHUB_WORKSPACE" "$source_repo"
          git --git-dir="$source_repo" fetch "$GITHUB_WORKSPACE" \
            "${source_sha}:refs/heads/ci-source"
          {
            echo "TEMPORALESS_GIT_REPO=$source_repo"
            echo "TEMPORALESS_GIT_SHA=$source_sha"
          } >> "$GITHUB_ENV"

      - name: Install Python packages from Git SHA with pip
        if: matrix.sdk == 'python'
        shell: bash
        run: |
          set -euo pipefail
          venv="$RUNNER_TEMP/python-git-install"
          source_url="git+file://${TEMPORALESS_GIT_REPO}@${TEMPORALESS_GIT_SHA}"
          flox activate -d "$GITHUB_WORKSPACE" -- uv venv --seed "$venv"
          flox activate -d "$GITHUB_WORKSPACE" -- "$venv/bin/python" -m pip install \
            --disable-pip-version-check \
            "$source_url#subdirectory=core/py" \
            "$source_url#subdirectory=adapters/py/connectworkflow" \
            "$source_url#subdirectory=adapters/py/indexstore" \
            "$source_url#subdirectory=adapters/py/prefectcompat" \
            "$source_url#subdirectory=adapters/py/temporalcompat"
          flox activate -d "$GITHUB_WORKSPACE" -- "$venv/bin/python" -c \
            'import temporaless, temporaless_connectworkflow, temporaless_indexstore, temporaless_prefectcompat, temporaless_temporalcompat'
          TEMPORALESS_EXPECTED_VERSION="$(tr -d '\n' < "$GITHUB_WORKSPACE/VERSION")"
          export TEMPORALESS_EXPECTED_VERSION
          flox activate -d "$GITHUB_WORKSPACE" -- "$venv/bin/python" -c \
            'import importlib.metadata, os; packages = ("temporaless", "temporaless-connectworkflow", "temporaless-indexstore", "temporaless-prefectcompat", "temporaless-temporalcompat"); expected = os.environ["TEMPORALESS_EXPECTED_VERSION"]; actual = {name: importlib.metadata.version(name) for name in packages}; assert set(actual.values()) == {expected}, (expected, actual)'

      - name: Install Go module from Git SHA
        if: matrix.sdk == 'go'
        shell: bash
        run: |
          set -euo pipefail
          consumer="$RUNNER_TEMP/go-git-install"
          mkdir -p "$consumer"
          cd "$consumer"
          flox activate -d "$GITHUB_WORKSPACE" -- go mod init example.com/temporaless-install-check
          export GIT_CONFIG_COUNT=3
          export GIT_CONFIG_KEY_0="url.file://${TEMPORALESS_GIT_REPO}.insteadOf"
          export GIT_CONFIG_VALUE_0="https://github.com/$GITHUB_REPOSITORY.git"
          export GIT_CONFIG_KEY_1="url.file://${TEMPORALESS_GIT_REPO}.insteadOf"
          export GIT_CONFIG_VALUE_1="https://github.com/$GITHUB_REPOSITORY"
          export GIT_CONFIG_KEY_2=protocol.file.allow
          export GIT_CONFIG_VALUE_2=always
          export GOPRIVATE="github.com/$GITHUB_REPOSITORY"
          export GONOSUMDB="github.com/$GITHUB_REPOSITORY"
          export GOPROXY=direct
          flox activate -d "$GITHUB_WORKSPACE" -- go get \
            "github.com/$GITHUB_REPOSITORY/core/go/workflow@$TEMPORALESS_GIT_SHA"
          flox activate -d "$GITHUB_WORKSPACE" -- go list \
            "github.com/$GITHUB_REPOSITORY/core/go/workflow"
          flox activate -d "$GITHUB_WORKSPACE" -- go build \
            "github.com/$GITHUB_REPOSITORY/core/go/workflow"

      - name: Check Rust crate from Git SHA
        if: matrix.sdk == 'rust'
        shell: bash
        env:
          # Compile the immutable Git-delivered workspace against its committed
          # lockfile. Generating a new consumer lock would resolve the latest
          # registry state and make this source-boundary check nondeterministic.
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_TIMEOUT: "120"
        run: |
          set -euo pipefail
          checkout="$RUNNER_TEMP/rust-git-checkout"
          for attempt in 1 2 3; do
            if (
              rm -rf "$checkout" &&
                git clone --quiet --no-checkout \
                  "$TEMPORALESS_GIT_REPO" "$checkout" &&
                git -C "$checkout" checkout --quiet --detach \
                  "$TEMPORALESS_GIT_SHA" &&
                test "$(git -C "$checkout" rev-parse HEAD)" = \
                  "$TEMPORALESS_GIT_SHA" &&
                cargo check --workspace --all-targets --locked \
                  --manifest-path "$checkout/Cargo.toml"
            ); then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Rust Git check attempt $attempt failed; retrying cleanly." >&2
              sleep $((attempt * 5))
            fi
          done
          echo "Rust Git check failed after 3 clean attempts." >&2
          exit 1

      - name: Install npm package from Git SHA
        if: matrix.sdk == 'npm'
        shell: bash
        run: |
          set -euo pipefail
          consumer="$RUNNER_TEMP/npm-git-install"
          mkdir -p "$consumer"
          cd "$consumer"
          npm init --yes
          # npm 12 defaults Git dependencies to disabled. Temporaless and its
          # pinned Invariant Protocol dependency are both intentionally
          # installed from immutable Git commits in this consumer test.
          npm install --allow-git=all \
            "git+file://${TEMPORALESS_GIT_REPO}#${TEMPORALESS_GIT_SHA}"
          node --input-type=module --eval \
            "await import('@jim-technologies/temporaless'); await import('@jim-technologies/temporaless/invariant')"

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build production image
        run: docker build --tag temporaless:ci .

      - name: Scan production image for fixable high-severity vulnerabilities
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "$HOME/.cache/trivy:/root/.cache" \
            aquasec/trivy:0.72.0@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image \
            --skip-version-check \
            --scanners vuln \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            temporaless:ci

      - name: Smoke test hardened production image
        shell: bash
        run: |
          set -euo pipefail
          container="temporaless-ci-smoke"

          diagnostics() {
            echo "Container state:" >&2
            docker inspect --format '{{json .State}}' "$container" >&2 || true
            echo "Container logs:" >&2
            docker logs "$container" >&2 || true
          }

          cleanup() {
            docker rm --force "$container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          cleanup

          docker run --detach \
            --name "$container" \
            --read-only \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=16m,uid=10001,gid=10001,mode=0700 \
            --tmpfs /data:rw,nosuid,nodev,noexec,size=64m,uid=10001,gid=10001,mode=0700 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --env AUTH_TOKEN=ci-smoke-placeholder \
            --env TEMPORALESS_STORAGE_SCHEME=fs \
            --env 'TEMPORALESS_STORAGE_OPTIONS={"root":"/data"}' \
            --env TEMPORALESS_ALLOW_UNSAFE_FS=1 \
            temporaless:ci

          for _ in $(seq 1 60); do
            state="$(docker inspect --format '{{.State.Status}}' "$container")"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container")"
            if [ "$state" != "running" ]; then
              echo "Container stopped before becoming healthy (state=$state)." >&2
              diagnostics
              exit 1
            fi
            if [ "$health" = "healthy" ]; then
              docker exec "$container" python -c \
                'import os; assert os.geteuid() == 10001; assert os.stat("/app").st_uid == 0; assert not os.access("/app", os.W_OK)'
              exit 0
            fi
            if [ "$health" = "unhealthy" ] || [ "$health" = "missing" ]; then
              echo "Container health check failed (health=$health)." >&2
              diagnostics
              exit 1
            fi
            sleep 1
          done

          echo "Container did not become healthy within 60 seconds." >&2
          diagnostics
          exit 1
