schema-version = "1.11.0"

[install]
# Exact bootstrap ceilings that resolve on Flox's four default systems.
# Go's checksum-verified toolchain selector below supplies the patched Go
# release while Flox continues to provide the portable bootstrap command.
go.pkg-path = "go"
go.version = "1.26.4"
python314.pkg-path = "python314"
python314.version = "python3-3.14.4"
uv.pkg-path = "uv"
uv.version = "0.11.25"
libffi.pkg-path = "libffi"
buf.pkg-path = "buf"
buf.version = "1.71.0"
gcc-unwrapped.pkg-path = "gcc-unwrapped"
gcc-unwrapped.outputs = ["lib"]

[vars]
UV_PYTHON_DOWNLOADS = "never"
GOTOOLCHAIN = "go1.26.5+auto"

[hook]
on-activate = '''
  export UV_PYTHON="$(command -v python3.14)"
'''
