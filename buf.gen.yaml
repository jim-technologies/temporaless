version: v2
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: core/go/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: core/go/gen
    opt: paths=source_relative
  - remote: buf.build/protocolbuffers/python:v35.1
    out: core/py/src
    include_imports: true
  - remote: buf.build/protocolbuffers/pyi:v35.1
    out: core/py/src
    include_imports: true
  # The BSR plugin currently trails connectrpc-python 0.11. Use the locked
  # local generator so generated clients and servers select Google protobuf
  # codecs to match the rest of Temporaless.
  # Strip the BSR credential before spawning the local generator. Trusted CI
  # needs BUF_TOKEN for remote plugins, but local package-manager subprocesses
  # must not inherit that credential.
  - local: [env, -u, BUF_TOKEN, uv, run, --frozen, --project, core/py, protoc-gen-connectrpc]
    out: core/py/src
    # connectrpc-python defaults to protobuf-py as of 0.10. Temporaless uses
    # Google's protobuf runtime across its Python core, Protovalidate, and
    # generated messages, so generate matching codecs explicitly.
    opt:
      - protobuf=google
      - io=async
  - remote: buf.build/bufbuild/es:v2.13.0
    out: core/ts/src/gen
    opt:
      - target=ts
      - import_extension=js
    include_imports: true
  # Rust proto codegen lives in core/rs/temporaless/build.rs (prost-build).
  # The buf community plugin uses prost-build 0.14 which doesn't support
  # edition 2023 yet; build.rs uses the latest crates.io prost-build instead.
inputs:
  - directory: api
