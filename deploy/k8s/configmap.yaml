apiVersion: v1
kind: ConfigMap
metadata:
  name: temporaless-config
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/part-of: temporaless
data:
  # Bind address / port. The Service targets 8080.
  PORT: "8080"

  # Log level for the application's slog/JSON logger. Uvicorn's own access
  # log is disabled in the bundled production_server.py (we control logging
  # via the JSON formatter).
  LOG_LEVEL: "INFO"

  # Storage backend. Replace this with your real OpenDAL scheme + config in
  # production: `s3://bucket/prefix?region=us-west-2&endpoint=...`,
  # `gcs://bucket/prefix`, `azblob://container/prefix`, etc.
  # The example here uses an emptyDir-backed fs path for dev clusters only.
  TEMPORALESS_STORAGE_ROOT: "/var/run/temporaless/data"
