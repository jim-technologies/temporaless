# DO NOT commit a real secret. This is the *shape* — generate the actual
# secret out-of-band and apply it before this manifest is referenced:
#
#   kubectl create secret generic temporaless-auth \
#       --namespace=temporaless \
#       --from-literal=auth-token="$(openssl rand -hex 32)"
#
# Or pull from your secret manager (External Secrets Operator, Vault Agent,
# AWS/GCP/Azure secret CSI driver, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: temporaless-auth
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/part-of: temporaless
type: Opaque
stringData:
  # Replace with the real token. Rotate on a schedule; the application
  # currently reads the token at process start, so rotation requires a
  # rolling restart (a 30-second drain on a 3-replica deployment).
  auth-token: replace-me-with-a-real-32-byte-hex-string
