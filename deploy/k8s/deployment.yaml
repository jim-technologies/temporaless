apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporaless
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: temporaless
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporaless
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporaless
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: temporaless
    spec:
      # Replace with your image registry. The bundled Dockerfile produces
      # an image that runs examples/py/production_server.py by default;
      # for your own service, build your own image and reference it here.
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/your-org/temporaless:latest  # replace
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: temporaless-config
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: temporaless-auth
                  key: auth-token
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 2
            successThreshold: 1
          # PreStop sleep gives the load balancer time to observe the
          # readyz=503 transition and stop sending traffic before the
          # process exits. Without this, kube-proxy / your ingress can race
          # with the SIGTERM and drop in-flight requests.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: storage
              mountPath: /var/run/temporaless
            - name: tmp
              mountPath: /tmp
      volumes:
        # emptyDir is fine for dev clusters. In production, configure your
        # OpenDAL operator to point at S3 / GCS / Azure Blob; you can
        # remove this volume entirely.
        - name: storage
          emptyDir:
            sizeLimit: 1Gi
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: temporaless
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/part-of: temporaless
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporaless
      app.kubernetes.io/component: server
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: temporaless
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/part-of: temporaless
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: temporaless
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
