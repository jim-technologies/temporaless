apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporaless
  namespace: temporaless
  labels:
    app.kubernetes.io/name: temporaless
    app.kubernetes.io/part-of: temporaless
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: temporaless
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow in-cluster callers. Tighten to specific namespaces / labels in
    # production — e.g. only your workflow-trigger services.
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS — required for service discovery + bucket DNS resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS to S3 / GCS / Azure Blob endpoints. Restrict by IP block in
    # production via your cloud-specific egress policy.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
